<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account - Craveh</title>
  <link rel="stylesheet" href="../assets/css/app.css">
</head>
<body>
  <header class="header">
    <div class="container header-container">
      <div class="logo">
        <img src="../assets/images/craveh(1).png" alt="Craveh logo">
        <h1>craveh</h1>
      </div>
      <button class="hamburger" id="hamburger-btn" aria-label="Toggle menu"><span></span><span></span><span></span></button>
      <nav class="nav" id="main-nav">
        <a href="menu.html" class="nav-link">Menu</a>
        <a href="history.html" class="nav-link">History</a>
        <a href="checkout.html" class="nav-link">Checkout <span id="cart-count" class="cart-badge">0</span></a>
        <a href="account.html" class="nav-link active" id="account-link">Account</a>
      </nav>
    </div>
  </header>


  <main class="main-content">
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">My Account</h1>
        <p class="page-subtitle">Manage your profile and delivery preferences</p>
      </div>
      <div id="auth-form" class="auth-container">
        <div class="form-card">
          <h2 id="auth-title">Login</h2>
          <form id="login-signup-form">
            <div id="name-field" class="form-group" style="display:none;">
              <label for="name-input">Name</label>
              <input type="text" id="name-input">
            </div>
            <div class="form-group">
              <label for="email-input">Email</label>
              <input type="email" id="email-input" required>
            </div>
            <div class="form-group">
              <label for="password-input">Password</label>
              <input type="password" id="password-input" required>
            </div>
            <p id="auth-error" class="error-message"></p>
            <button type="submit" class="btn btn-primary btn-block" id="auth-submit-btn">Login</button>
          </form>
          <p class="auth-toggle">
            <span id="auth-toggle-text">Don't have an account? </span>
            <button type="button" id="auth-toggle-btn" class="link-btn">Sign Up</button>
          </p>
        </div>
      </div>

      <div id="user-profile" class="profile-container" style="display:none;">
        <div class="profile-card profile-header-card">
          <div class="profile-header">
            <div class="profile-avatar" id="profile-avatar"></div>
            <div class="profile-info">
              <h2 id="profile-name"></h2>
              <p id="profile-email"></p>
            </div>
          </div>
          <div class="profile-stats">
            <div class="profile-stat">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
              <div>
                <span class="stat-label">Account ID</span>
                <span class="stat-value" id="profile-id"></span>
              </div>
            </div>
            <div class="profile-stat">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
              </svg>
              <div>
                <span class="stat-label">Member Since</span>
                <span class="stat-value" id="profile-since"></span>
              </div>
            </div>
          </div>
        </div>

        <div class="profile-card">
          <h3 class="profile-section-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
              <circle cx="12" cy="10" r="3"></circle>
            </svg>
            Delivery Information
          </h3>
          <p class="profile-section-desc">This information will be used to auto-fill your checkout details.</p>
          <form id="profile-address-form">
            <div class="form-group">
              <label for="profile-phone">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                </svg>
                Phone Number
              </label>
              <input type="tel" id="profile-phone" placeholder="Your phone number">
              <p class="field-error" id="profile-phone-error"></p>
            </div>
            <div class="form-group">
              <label for="profile-street">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                  <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                Street Address
              </label>
              <input type="text" id="profile-street" placeholder="123 Main St">
            </div>
            <div class="form-row">
              <div class="form-group form-group-flex">
                <label for="profile-city">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                  </svg>
                  City
                </label>
                <input type="text" id="profile-city" placeholder="City">
              </div>
              <div class="form-group form-group-flex">
                <label for="profile-state">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                    <polyline points="2 17 12 22 22 17"></polyline>
                    <polyline points="2 12 12 17 22 12"></polyline>
                  </svg>
                  State
                </label>
                <input type="text" id="profile-state" placeholder="State">
              </div>
              <div class="form-group form-group-flex">
                <label for="profile-zip">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="10" r="3"></circle>
                    <path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 1 0-16 0c0 3 2.7 6.9 8 11.7z"></path>
                  </svg>
                  ZIP Code
                </label>
                <input type="text" id="profile-zip" placeholder="10001">
              </div>
            </div>
            <div class="form-group">
              <label for="profile-building">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
                  <line x1="9" y1="6" x2="15" y2="6"></line>
                  <line x1="9" y1="10" x2="15" y2="10"></line>
                  <line x1="9" y1="14" x2="15" y2="14"></line>
                  <line x1="9" y1="18" x2="15" y2="18"></line>
                </svg>
                Building Name <span class="label-optional">(optional)</span>
              </label>
              <input type="text" id="profile-building" placeholder="e.g. Sunrise Apartments">
            </div>
            <div class="form-row">
              <div class="form-group form-group-flex"><label for="profile-floor">Floor <span class="label-optional">(optional)</span></label><input type="text" id="profile-floor" placeholder="e.g. 3rd"></div>
              <div class="form-group form-group-flex"><label for="profile-apt">Apt / Suite <span class="label-optional">(optional)</span></label><input type="text" id="profile-apt" placeholder="e.g. 4B"></div>
            </div>
            <div class="form-group">
              <label for="profile-landmark">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                  <circle cx="12" cy="10" r="3"></circle>
                </svg>
                Landmark <span class="label-optional">(optional)</span>
              </label>
              <input type="text" id="profile-landmark" placeholder="e.g. Near Central Park">
            </div>
            <p class="field-error" id="profile-address-error"></p>
            <p class="success-message" id="profile-address-success"></p>
            <button type="submit" class="btn btn-primary btn-block" id="save-address-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                <polyline points="17 21 17 13 7 13 7 21"></polyline>
                <polyline points="7 3 7 8 15 8"></polyline>
              </svg>
              Save Changes
            </button>
          </form>
        </div>

        <div class="profile-card profile-actions-card">
          <button id="logout-btn" class="btn btn-destructive btn-block">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Sign Out
          </button>
        </div>
      </div>
    </div>
  </main>
  <footer class="footer"><div class="container">&copy; 2025 <span class="footer-brand">Craveh</span>. All rights reserved.</div></footer>
  <script src="../assets/js/common.js"></script>
  <script src="../assets/js/account.js"></script>
</body>
</html>
