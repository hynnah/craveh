<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu - Craveh</title>
  <link rel="stylesheet" href="../assets/css/app.css">
</head>
<body>
  <header class="header">
    <div class="container header-container">
      <div class="logo">
        <img src="../assets/images/craveh(1).png" alt="Craveh logo">
        <h1>craveh</h1>
      </div>
      <button class="hamburger" id="hamburger-btn" aria-label="Toggle menu"><span></span><span></span><span></span></button>
      <nav class="nav" id="main-nav">
        <a href="menu.html" class="nav-link active">Menu</a>
        <a href="history.html" class="nav-link">History</a>
        <a href="checkout.html" class="nav-link">Checkout <span id="cart-count" class="cart-badge">0</span></a>
        <a href="account.html" class="nav-link" id="account-link">Account</a>
      </nav>
    </div>
  </header>

  <!-- Hero -->
  <section class="menu-hero">
    <div class="container">
      <h2 class="menu-hero-title">What are you craving today?</h2>
      <p class="menu-hero-sub">Fresh food, delivered fast to your door.</p>
      <div class="menu-search-wrapper">
        <svg class="menu-search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="menu-search" class="menu-search" placeholder="Search menu...">
      </div>
    </div>
  </section>

  <main class="main-content main-content-menu">
    <div class="container">
      <div id="category-filter" class="category-filter"></div>
      <p id="menu-result-count" class="menu-result-count"></p>
      <div id="menu-grid" class="menu-grid"></div>
      <div id="menu-empty" class="menu-empty" style="display:none;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <p>No items found. Try a different search.</p>
      </div>
    </div>
  </main>

  <footer class="footer"><div class="container">&copy; 2025 <span class="footer-brand">Craveh</span>. All rights reserved.</div></footer>
  <script src="../assets/js/common.js"></script>
  <script src="../assets/js/menu.js"></script>
</body>
</html>
